# Cấu hình kết nối cơ sở dữ liệu MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/javaweb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=2006

# Cấu hình Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cấu hình Spring MVC View Resolver cho JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Cấu hình dung lượng upload file tối đa
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB